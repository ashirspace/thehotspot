<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>thehotspot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <div id="splash">
    <img src="/logo.png" id="splash-logo" alt="thehotspot" />
    <div id="splash-name">thehotspot</div>
  </div>
  <style>
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #09090d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.5s ease;
    }
    #splash-logo {
      width: 72px;
      height: 72px;
      object-fit: contain;
      animation: splashFloat 1.4s ease-in-out infinite alternate;
    }
    #splash-name {
      color: #ffffff;
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
      opacity: 0.85;
      animation: splashFadeIn 0.6s ease forwards;
    }
    @keyframes splashFloat {
      from { transform: translateY(0px) scale(1);   opacity: 0.8; }
      to   { transform: translateY(-8px) scale(1.06); opacity: 1;   }
    }
    @keyframes splashFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 0.85; transform: translateY(0); }
    }
  </style>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
